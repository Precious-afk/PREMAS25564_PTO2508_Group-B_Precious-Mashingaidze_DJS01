<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PodcastApp</title>
    <meta
      name="description"
      content="Browse podcast shows. Cover art, seasons, genres, and last-updated dates."
    />

    <!-- Modern, clean type pairing -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- ============ HEADER ============ -->
    <header class="site-header">
      <div class="header-inner">
        <a href="#" class="brand" aria-label="PodcastApp home">
          <!-- Microphone / podcast mark -->
          <svg
            class="brand-icon"
            viewBox="0 0 24 24"
            width="22"
            height="22"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M12 1a4 4 0 0 0-4 4v6a4 4 0 0 0 8 0V5a4 4 0 0 0-4-4z" />
            <path d="M19 10v1a7 7 0 0 1-14 0v-1" />
            <line x1="12" y1="18" x2="12" y2="22" />
            <line x1="8" y1="22" x2="16" y2="22" />
          </svg>
          <span class="brand-name">PodcastApp</span>
        </a>

        <div class="header-actions">
          <button
            type="button"
            class="icon-btn"
            aria-label="Search"
            title="Search"
          >
            <svg
              viewBox="0 0 24 24"
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="11" cy="11" r="7" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
          <button type="button" class="avatar-btn" aria-label="Account">
            <img
              src="https://i.pravatar.cc/64?img=12"
              alt=""
              class="avatar-img"
            />
          </button>
        </div>
      </div>
    </header>

    <!-- ============ FILTER BAR ============ -->
    <section class="filter-bar" aria-label="Filter podcasts">
      <div class="filter-inner">
        <span class="filter-label">Filter by:</span>

        <div class="select-wrap">
          <select
            id="genreFilter"
            class="select"
            aria-label="Filter by genre"
          >
            <option value="all">All Genres</option>
            <!-- Genre options populated by JS from GenreService -->
          </select>
        </div>

        <div class="select-wrap">
          <select id="sortFilter" class="select" aria-label="Sort by">
            <option value="recent">Recently Updated</option>
            <option value="popular">Most Popular</option>
            <option value="newest">Newest</option>
          </select>
        </div>
      </div>
    </section>

    <!-- ============ PODCAST GRID ============ -->
    <main class="container">
      <section
        id="podcastGrid"
        class="podcast-grid"
        aria-label="Podcast previews"
      ></section>
    </main>

    <!-- ============ MODAL ============ -->
    <div
      id="modal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
      aria-hidden="true"
      hidden
    >
      <div class="modal-backdrop" data-close="true"></div>

      <div class="modal-panel" role="document">
        <header class="modal-header">
          <h2 id="modalTitle" class="modal-title"></h2>
          <button
            id="closeModal"
            class="modal-close"
            type="button"
            aria-label="Close dialog"
          >
            <svg
              viewBox="0 0 24 24"
              width="22"
              height="22"
              aria-hidden="true"
              focusable="false"
            >
              <path
                d="M6 6l12 12M18 6L6 18"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </header>

        <div class="modal-body">
          <div class="modal-top">
            <div class="modal-cover-wrap">
              <img id="modalImage" class="modal-cover" alt="" />
            </div>

            <div class="modal-detail">
              <h3 class="modal-subhead">Description</h3>
              <p id="modalDescription" class="modal-description"></p>

              <h3 class="modal-subhead">Genres</h3>
              <div
                id="modalGenres"
                class="modal-genres"
                aria-label="Genres"
              ></div>

              <p id="modalUpdated" class="modal-updated">
                <svg
                  viewBox="0 0 24 24"
                  width="14"
                  height="14"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                  <line x1="16" y1="2" x2="16" y2="6" />
                  <line x1="8" y1="2" x2="8" y2="6" />
                  <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                <span id="modalUpdatedText"></span>
              </p>
            </div>
          </div>

          <section class="seasons-section" aria-labelledby="seasonsHeading">
            <h3 id="seasonsHeading" class="seasons-heading">Seasons</h3>
            <ul id="modalSeasons" class="seasons-list"></ul>
          </section>
        </div>
      </div>
    </div>

    <!-- ============ ENTRY POINT ============ -->
    <script type="module" src="src/index.js"></script>
  </body>
</html>
